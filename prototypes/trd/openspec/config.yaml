# Project context — shown to AI agents when creating artifacts
# ════════════════════════════════════════════════════════════════════
context: |
  ## Project: core-template-frontend

  Ardua's official frontend template for every core financial app (core-app,
  core-lex, core-ops, core-trd, core-fin, and future core apps). Serves three
  purposes:
    1. GitHub template repository — clonable via "Use this template".
    2. Base commit for migrating the existing Ardua core frontends.
    3. Scaffold that allows backend-first developers to implement frontend
       features via Claude Code + OpenSpec without deep frontend expertise.

  ## Canonical project memory (READ FIRST)

  Before producing any artifact, the authoritative conventions, stack rules,
  code style, workflow, and communication protocol live in `CLAUDE.md` and
  `AGENTS.md` at the repo root. These two files are byte-identical mirrors
  and are automatically loaded by Claude Code and other AI coding assistants
  on every session.

  This `context:` block is a concise runtime injection for OPSX commands; it
  intentionally duplicates only the essentials. When conventions are unclear,
  defer to `CLAUDE.md` at the repo root — it is the single source of truth.

  Ardua-specific playbooks for common tasks (add module, add block, configure
  header CTAs, add row actions, add confirm dialog, add alert banner, build
  filterable list, compose KPI dashboard, build form, add API endpoint) live
  in `.claude/skills/ardua-*/SKILL.md` and are auto-discovered by the agent
  via description-matching.

  ## Tech stack (pinned — do not drift without an approved change proposal)

  - Vue 3.5 + TypeScript strict + Vite 7
  - Vue Router 4 + Pinia + @tanstack/vue-query + @tanstack/vue-table
  - Tailwind 4 + shadcn-vue (reka-ui) + lucide-vue-next + vue-sonner
  - vee-validate + zod for forms
  - Axios with @auth0/auth0-vue
  - @vueuse/core, date-fns, clsx, tailwind-merge
  - Opt-in: vue-i18n, launchdarkly-vue-client-sdk (via VITE_FEATURE_* flags)
  - Tooling: ESLint 9 flat, Prettier, Vitest + @vue/test-utils, Husky, lint-staged

  ## Core capabilities (governed by openspec/specs/)

  The template ships 18 capabilities archived under `openspec/specs/`.
  Run `npm run spec:list` for the current set. Highlights:
  - Layout & navigation: core-layout, core-navigation, core-modulo-genericos
  - Data & actions: core-data-tables, core-actions-menu, core-actions-manifest,
    core-module-types
  - Modals & forms: core-modals, core-forms, core-dynamic-forms,
    core-multi-step-form
  - Cross-cutting: core-theming, core-api-layer, core-auth, core-error-handling,
    core-file-upload, core-charts, core-websocket-client

  ## Conventions

  - **Language: English only** in all code, comments, and technical identifiers.
    User-facing strings in pages may be Spanish (internal tools).
  - **TypeScript strict on.** `any` is forbidden. Prefer `unknown` when a
    genuine type-erased boundary is needed.
  - **No hardcoded design values.** Colors, spacing, and typography must be
    token-driven (see core-theming capability).
  - **Path alias `@/*` → `./src/*`.** Relative imports across feature
    boundaries are discouraged.
  - **Pages follow the L1/L2/L3 pattern** from core-layout (page header,
    KPI cards, section + data surface).
  - **Tables use the `useTable` composable** for client-side, or
    `@tanstack/vue-query` for server-side — hand-rolled pagination logic in
    page components is forbidden.
  - **Per-row actions use the shared `ActionsMenu.vue` portal component**
    (see core-actions-menu). Inline dropdowns inside `<td>` are forbidden.
  - **Modals use the Cancelar / Primary pair in the footer.** Detail modals
    transition to Edit via an `Editar` button.
  - **Route guards use closures** (`createAuthGuard(auth0)`), never the
    `router.setAuth0()` hack from the legacy Ardua repos.

  ## Change integration with Jira

  - Every OpenSpec change corresponds to at least one Jira REQ (project key
    `REQ`, cloud ID 53eec1f8-a156-4af9-bc3a-d6142b50e0cc).
  - The proposal.md first line must reference the Jira REQ:
    `- Jira REQ: [REQ-XX](https://arduasolutions.atlassian.net/browse/REQ-XX)`
  - Module affected (if any) on the second line: `- Module: CLP` / `OPS` /
    `TRD` / `FIN` / `LEX`.

  ## Quality gates

  Every change must pass:
    - `npm run type-check` (vue-tsc --noEmit, strict)
    - `npm run lint` (ESLint flat config)
    - `npm run test:run` (Vitest)
    - `openspec validate --all --strict`
    - `npm run build:qa` (Vite production build, mode=qa)

# ════════════════════════════════════════════════════════════════════
# Per-artifact rules
# ════════════════════════════════════════════════════════════════════
rules:
  proposal:
    - Start with Jira REQ frontmatter before the H1 title
    - Include a "Why" section that names the concrete problem, not the feature
    - Include a "What Changes" section listing bullet-pointed changes
    - Include a "Capabilities" section listing new / affected / seed capabilities
  tasks:
    - Group tasks by affected layer (API, components, pages, tests, docs)
    - Every task must be independently verifiable
    - "Checkbox format: `- [ ]` for pending, `- [x]` for done"
  spec:
    - Every Requirement uses SHALL or MUST (RFC 2119)
    - Every Requirement has at least one Scenario
    - Every Scenario uses GIVEN / WHEN / THEN when the precondition is
      non-trivial; WHEN / THEN is acceptable when there is no precondition
    - Capability names use kebab-case, prefixed with `core-` for shell
      capabilities, app-specific prefix for app-specific capabilities
