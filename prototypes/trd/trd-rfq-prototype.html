<style>
*{box-sizing:border-box;margin:0;padding:0}

body{font-family:'DM Sans',sans-serif;background:var(--g50);height:100vh;overflow:hidden}

</style>
</head>

function checkFoThreshold(lotId){var l=LOTS.find(function(x){return x.id===lotId;});var v=parseFloat(document.getElementById('fo-amt').value)||0;var over=v>l.threshold;document.getElementById('fo-threshold-warn').style.display=over?'flex':'none';document.getElementById('fo-approval-wrap').style.display=over?'block':'none';}
function saveFundsIn(id){var amt=parseFloat(document.getElementById('fi-amt').value)||0;var ref=(document.getElementById('fi-ref').value||'').trim();if(!amt||amt<=0){S.feedback='El monto debe ser mayor a 0.';S.fbType='err';render();return;}if(!ref){S.feedback='La referencia externa es obligatoria.';S.fbType='err';render();return;}var l=LOTS.find(function(x){return x.id===id;});l.available+=amt;S.feedback='Fondeado: +'+fmt(amt)+' USDT';S.fbType='ok';render();setTimeout(function(){S.selectedLot=null;S.feedback='';render();},1600);}
function saveFundsOut(id){var amt=parseFloat(document.getElementById('fo-amt').value)||0;var reason=(document.getElementById('fo-reason').value||'').trim();if(!amt||amt<=0){S.feedback='El monto debe ser mayor a 0.';S.fbType='err';render();return;}var l=LOTS.find(function(x){return x.id===id;});if(amt>l.available){S.feedback='El monto supera el disponible ('+fmt(l.available)+' USDT).';S.fbType='err';render();return;}if(reason.length<10){S.feedback='El motivo debe tener al menos 10 caracteres.';S.fbType='err';render();return;}if(amt>l.threshold&&getCurrentUser().rol==='MESA_TRADER'){S.feedback='Este retiro requiere aprobacion de Supervisor.';S.fbType='err';render();return;}l.available-=amt;S.feedback='Retiro registrado: -'+fmt(amt)+' USDT';S.fbType='ok';render();setTimeout(function(){S.selectedLot=null;S.feedback='';render();},1600);}
function suspendLot(id){var l=LOTS.find(function(x){return x.id===id;});l.status='SUSPENDED';S.selectedLot=null;render();}
function resumeLot(id){var l=LOTS.find(function(x){return x.id===id;});l.status='ACTIVE';S.selectedLot=null;render();}
function closeLotAction(id){var l=LOTS.find(function(x){return x.id===id;});if(l.reserved>0){S.selectedLot=null;S.lotAction={type:'close_blocked',lot:l};render();}else{l.status='CLOSED';S.selectedLot=null;render();}}

function renderAlertasTab(){
  if(ALERTS.length===0)return '<div style="text-align:center;padding:40px;color:var(--g400)"><p style="font-size:16px;margin-bottom:8px">Sin alertas activas</p><p style="font-size:13px">El sistema opera con normalidad.</p></div>';
  return '<div style="max-width:640px">'+ALERTS.map(function(a){var l=LOTS.find(function(x){return x.id===a.lotId;})||{};var btnStyle='border-color:'+(a.type==='provider_down'||a.type==='reject_rate'?'var(--rring);color:var(--red)':a.type==='underfunded'?'var(--aring);color:var(--amber)':'var(--oring);color:var(--orange)');return '<div class="alert-card '+a.color+'"><div class="alert-card-header"><span class="alert-card-title" style="color:'+a.titleColor+'"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'+a.title+'</span><span style="font-size:11px;color:var(--g400)">'+l.name+'</span></div><p class="alert-card-msg">'+a.desc+'</p><button class="alert-card-action" style="'+btnStyle+'" onclick="openLot(\''+a.lotId+'\')">'+a.action+'</button></div>';}).join('')+'</div>';
}

function renderClientes(){
  var tabs='<div class="subtabs" style="margin-bottom:20px"><button class="stab'+(S.clientTab==='clientes'?' active':'')+'" onclick="setClientTab(\'clientes\')">Clientes</button><button class="stab'+(S.clientTab==='grupos'?' active':'')+'" onclick="setClientTab(\'grupos\')">Grupos</button></div>';
  if(S.clientTab==='grupos')return tabs+renderGrupos();
  var rows=CLIENTS.map(function(c){var be=c.bps!=null?c.bps:(GROUPS.find(function(g){return g.name===c.group;})||{}).bps||'-';var ep=c.expMax?Math.round(c.expCur/c.expMax*100):null;var ec=ep!=null?(ep>=90?'danger':ep>=70?'warn':''):'';return '<tr>'+
    '<td><span style="font-size:12.5px;font-weight:500">'+c.name+'</span></td>'+
    '<td class="td-mono" style="font-size:11.5px">'+c.legajo+'</td>'+
    '<td>'+(c.group?c.group:'<span style="color:var(--g400)">-</span>')+'</td>'+
    '<td><div style="display:flex;align-items:center;gap:5px"><span class="td-mono" style="font-size:12.5px;font-weight:600">'+be+'</span>'+(be!=='-'?'<span style="font-size:10.5px;color:var(--g400)">BPS</span>':'')+' <span class="src-badge src-'+c.bpsS.toLowerCase()+'">'+c.bpsS+'</span></div></td>'+
    '<td><div class="exp-bar-wrap"><span class="exp-current">'+fmt(c.expCur)+'</span>'+(c.expMax?'<div class="exp-bar"><div class="exp-bar-fill '+ec+'" style="width:'+Math.min(ep,100)+'%"></div></div><span class="exp-nums">/ '+fmt(c.expMax)+' max</span>':'<span class="exp-nums" style="color:var(--g400)">Sin limite</span>')+'</div></td>'+
    '<td><span class="src-badge src-'+c.expS.toLowerCase()+'">'+c.expS+'</span></td>'+
    '<td onclick="event.stopPropagation()"><button class="btn btn-sm" onclick="openEditClient(\''+c.id+'\')">Editar</button></td>'+
  '</tr>';}).join('');
  return tabs+'<div class="tcard"><div class="tcard-header"><div class="tcard-title">Clientes <span style="font-size:12px;font-weight:400;color:var(--g400)">'+CLIENTS.length+' registros</span></div></div><div class="table-wrap"><table class="table"><thead><tr><th>Nombre</th><th>Legajo</th><th>Grupo</th><th>BPS Efectivo</th><th>Exposicion Actual</th><th>Fuente Exp.</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}
function renderGrupos(){
  var rows=GROUPS.map(function(g){return '<tr><td style="font-weight:600">'+g.name+'</td><td><span class="td-mono" style="font-size:13px;font-weight:600;color:var(--violet)">'+g.bps+' BPS</span></td><td><span class="td-mono" style="font-size:12.5px">'+fmt(g.expMax)+'</span></td><td>'+g.members+' clientes</td><td onclick="event.stopPropagation()">'+(getCurrentUser().rol==='MESA_SUPERVISOR'?'<button class="btn btn-sm" onclick="openEditGroup(\''+g.id+'\')">Editar</button>':'<span style="font-size:11.5px;color:var(--g400)">Solo Supervisor</span>')+'</td></tr>';}).join('');
  return '<div class="tcard"><div class="tcard-header"><div class="tcard-title">Grupos de Clientes</div>'+(getCurrentUser().rol==='MESA_SUPERVISOR'?'<button class="btn btn-primary btn-sm" onclick="openCreateGroup()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Crear Grupo</button>':'')+'</div><div class="table-wrap"><table class="table"><thead><tr><th>Nombre</th><th>BPS Grupo</th><th>Max. Exposicion</th><th>Miembros</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}
function openEditClient(id){S.editClient=id;S.feedback='';render();}
function closeEditClient(){S.editClient=null;S.feedback='';render();}
function openEditGroup(id){S.editGroup=id;S.feedback='';render();}
function closeEditGroup(){S.editGroup=null;S.feedback='';render();}
function openCreateGroup(){S.editGroup='NEW';S.feedback='';render();}
function renderEditGroupModal(){
  var isNew=S.editGroup==='NEW';var g=isNew?{id:'',name:'',bps:'',expMax:'',members:0}:GROUPS.find(function(x){return x.id===S.editGroup;});if(!g)return '';
  var gid=isNew?'NEW':g.id;
  return '<div class="modal-backdrop" onclick="if(event.target===this)closeEditGroup()"><div class="modal" onclick="event.stopPropagation()">'+
    '<div class="modal-header"><div><div class="modal-title">'+(isNew?'Crear Grupo':'Editar Grupo')+'</div>'+(isNew?'':'<div class="modal-sub">'+g.name+'</div>')+'</div><button class="close-btn" onclick="closeEditGroup()">x</button></div>'+
    '<div class="modal-body"><div class="form-grid">'+
      '<div class="form-group full"><label class="form-label">Nombre del grupo *</label><input id="eg-name" class="form-input" type="text" placeholder="Ej: Premium" value="'+(isNew?'':g.name)+'"></div>'+
      '<div class="form-group"><label class="form-label">BPS del grupo *</label><input id="eg-bps" class="form-input" type="number" placeholder="Ej: 25" value="'+(isNew?'':g.bps)+'"><span class="form-hint">Aplica a miembros sin override personal</span></div>'+
      '<div class="form-group"><label class="form-label">Max. Exposicion (USDT) *</label><input id="eg-exp" class="form-input" type="number" placeholder="Ej: 100000" value="'+(isNew?'':g.expMax)+'"><span class="form-hint">Capital maximo en reservas activas por cliente</span></div>'+
    '</div>'+
    '<div style="background:var(--g50);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--g600);margin-top:4px">Precedencia: Override personal &gt; BPS/limite del grupo &gt; Default del sistema</div>'+
    (S.feedback?'<div class="save-fb '+S.fbType+'" style="margin-top:10px">'+S.feedback+'</div>':'')+
    '</div><div class="modal-footer"><button class="btn" onclick="closeEditGroup()">Cancelar</button><button class="btn btn-primary" onclick="saveGroup(\''+gid+'\')">'+(isNew?'Crear Grupo':'Guardar cambios')+'</button></div></div></div>';
}
function saveGroup(id){var name=(document.getElementById('eg-name').value||'').trim();var bps=parseFloat(document.getElementById('eg-bps').value);var expMax=parseFloat(document.getElementById('eg-exp').value);if(!name){S.feedback='El nombre es obligatorio.';S.fbType='err';render();return;}if(!bps||bps<=0){S.feedback='El BPS debe ser mayor a 0.';S.fbType='err';render();return;}if(!expMax||expMax<=0){S.feedback='La exposicion maxima debe ser mayor a 0.';S.fbType='err';render();return;}if(id==='NEW'){GROUPS.push({id:'GRP-00'+(GROUPS.length+1),name:name,bps:bps,expMax:expMax,members:0});S.feedback='Grupo creado.';}else{var g=GROUPS.find(function(x){return x.id===id;});if(g){g.name=name;g.bps=bps;g.expMax=expMax;}S.feedback='Grupo actualizado.';}S.fbType='ok';render();setTimeout(function(){S.editGroup=null;S.feedback='';render();},1500);}
function renderEditClientModal(){
  var c=CLIENTS.find(function(x){return x.id===S.editClient;});if(!c)return '';
  var be=c.bps!=null?c.bps:(GROUPS.find(function(g){return g.name===c.group;})||{}).bps||'-';
  return '<div class="modal-backdrop" onclick="if(event.target===this)closeEditClient()"><div class="modal" onclick="event.stopPropagation()">'+
    '<div class="modal-header"><div><div class="modal-title">Editar Pricing</div><div class="modal-sub">'+c.name+'</div></div><button class="close-btn" onclick="closeEditClient()">x</button></div>'+
    '<div class="modal-body"><div class="form-grid">'+
      '<div class="form-group full"><label class="form-label">Grupo</label><select id="ec-group" class="form-input"><option value="">Sin grupo asignado</option>'+GROUPS.map(function(g){return '<option value="'+g.name+'"'+(c.group===g.name?' selected':'')+'>'+g.name+' ('+g.bps+' BPS)</option>';}).join('')+'</select></div>'+
      '<div class="form-group"><label class="form-label">BPS Override (personal)</label><input id="ec-bps" class="form-input" type="number" placeholder="Dejar vacio para usar grupo" value="'+(c.bps!=null?c.bps:'')+'"><span class="form-hint">Prevalece sobre el BPS del grupo</span></div>'+
      '<div class="form-group"><label class="form-label">Max. Exposicion Override</label><input id="ec-exp" class="form-input" type="number" placeholder="Dejar vacio para usar grupo" value="'+(c.expMax||'')+'"><span class="form-hint">Capital maximo en reservas activas</span></div>'+
    '</div>'+
    '<div style="background:var(--g50);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--g600);margin-top:4px">Precedencia: Override personal &gt; Grupo &gt; Default del sistema</div>'+
    '<div style="margin-top:10px;font-size:12px;color:var(--g600)">BPS efectivo actual: <strong style="color:var(--violet)">'+be+' BPS</strong> (fuente: '+c.bpsS+')</div>'+
    (S.feedback?'<div class="save-fb '+S.fbType+'" style="margin-top:10px">'+S.feedback+'</div>':'')+
    '</div><div class="modal-footer"><button class="btn" onclick="closeEditClient()">Cancelar</button><button class="btn btn-primary" onclick="saveClientPricing(\''+c.id+'\')">Guardar</button></div></div></div>';
}
function saveClientPricing(id){var c=CLIENTS.find(function(x){return x.id===id;});var bps=document.getElementById('ec-bps').value;var exp=document.getElementById('ec-exp').value;var grp=document.getElementById('ec-group').value;c.group=grp||null;c.bps=bps!==''?parseFloat(bps):null;c.bpsS=bps!==''?'CLIENT':(grp?'GROUP':'UNDEFINED');c.expMax=exp!==''?parseFloat(exp):null;c.expS=exp!==''?'CLIENT':(grp?'GROUP':'NONE');S.feedback='Pricing actualizado.';S.fbType='ok';render();setTimeout(function(){S.editClient=null;S.feedback='';render();},1500);}

function renderRfq(){
  var content=renderLotes();
  var overlay=S.selectedLot?renderLotModal():S.lotAction&&S.lotAction.type==='close_blocked'?renderCloseBlockedModal():S.lotAction&&S.lotAction.type==='create'?renderCreateLotModal():'';
  return '<div class="page-header"><div><div class="page-title">RFQ Gateway</div><div class="page-sub">Gestion de lotes de liquidez GPS/PPS</div></div></div>'+content+overlay;
}

function render(){
  var pc=document.getElementById('page-content');
  switch(S.page){
    case 'quotes':pc.innerHTML=renderQuotesPage();break;
    case 'bots':pc.innerHTML=placeholder('<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>','Bots','Estrategias automatizadas sin cambios.');break;
    case 'clientes':pc.innerHTML='<div class="page-header"><div><div class="page-title">Clientes</div><div class="page-sub">Gestion de BPS, grupos y exposicion</div></div></div>'+renderClientes()+(S.editClient?renderEditClientModal():'')+(S.editGroup?renderEditGroupModal():'');break;
    default:pc.innerHTML=renderRfq();
  }
}
render();
</script>
</body>
</html>
